name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Fast gate: catch formatting errors in ~15s before expensive jobs start ──
  fmt-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  # ── Build & Test ──
  #
  # Tests are split into three parallel jobs for performance:
  #   1. Unit + crypto: lib tests + pure crypto (no global state, parallel-safe)
  #   2-3. PKCS#11 ABI shards: serial tests split across 2 runners
  #
  # PKCS#11 §5.10 mandates one C_Initialize/C_Finalize per process, so ABI
  # tests must run with --test-threads=1. Each `cargo test --test X` invocation
  # gets its own process, so sharding across runners is safe.
  #
  # On PRs: Ubuntu-only. On main push: full OS matrix.

  # ── Shard 1: Unit tests + pure crypto (parallel-safe) + workspace members ──
  test-unit:
    name: Unit & Crypto Tests (${{ matrix.os }})
    needs: fmt-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2

      - name: Run parallel-safe tests (pure crypto, no global state)
        run: >-
          cargo test --lib
          --test crypto_vectors
          --test drbg_tests
          --test concurrent_stress
          --test zeroization
          --test integrity_tests
          --test multi_slot
          --
          --test-threads=8
        timeout-minutes: 15
        env:
          RUST_BACKTRACE: 1

      - name: Run audit & FIPS POST tests (serial — shared IV tracker)
        run: >-
          cargo test
          --test audit_and_integrity
          --
          --test-threads=1
        timeout-minutes: 10
        env:
          RUST_BACKTRACE: 1

      - name: Run workspace member tests
        run: >-
          cargo test
          -p craton-hsm-admin
          -p pkcs11-spy
          -p craton-hsm-daemon
          --
          --test-threads=1
        timeout-minutes: 10
        env:
          RUST_BACKTRACE: 1


  # ── Shard 2: PKCS#11 ABI — compliance, conformance, error paths, info ──
  test-abi-shard1:
    name: ABI Tests — Compliance (${{ matrix.os }})
    needs: fmt-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2

      - name: Run PKCS#11 compliance & conformance tests
        run: >-
          cargo test
          --test attribute_management
          --test attribute_validation
          --test digest_abi
          --test fips_approved_mode
          --test negative_edge_cases
          --test operation_state
          --test pkcs11_compliance
          --test pkcs11_compliance_extended
          --test pkcs11_conformance
          --test pkcs11_error_paths
          --test pkcs11_info_functions
          --test random_and_session
          --test session_state_machine
          --test supplementary_functions
          --
          --test-threads=1
        timeout-minutes: 20
        env:
          RUST_BACKTRACE: 1


  # ── Shard 3: PKCS#11 ABI — crypto operations (keys, encrypt, sign, PQC) ──
  test-abi-shard2:
    name: ABI Tests — Crypto Ops (${{ matrix.os }})
    needs: fmt-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2

      - name: Run PKCS#11 crypto operation tests
        run: >-
          cargo test
          --test backup_restore
          --test concurrent_session_stress
          --test crypto_vectors_phase2
          --test key_derivation_abi
          --test key_lifecycle_abi
          --test key_wrapping_abi
          --test multipart_encrypt_decrypt
          --test multipart_sign_verify
          --test pairwise_consistency
          --test persistence
          --test pqc_abi_comprehensive
          --test pqc_phase3
          --test rsa_abi_comprehensive
          --test security_properties
          --
          --test-threads=1
        timeout-minutes: 25
        env:
          RUST_BACKTRACE: 1


  # ── Clippy lint (non-blocking) ──
  lint:
    name: Clippy
    needs: fmt-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2

      - name: Run Clippy
        # Deny correctness and suspicious lints (safety-critical for a crypto project).
        # Other clippy categories remain warnings until pre-existing issues are resolved.
        run: >-
          cargo clippy --workspace --
          -D clippy::correctness -D clippy::suspicious
          -A deprecated -A clippy::incompatible_msrv
          -A clippy::not_unsafe_ptr_arg_deref

  # ── Semver Checks: catch accidental breaking changes ──
  semver-checks:
    name: Semver Compliance
    needs: fmt-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2
        with:
          tool: cargo-semver-checks

      - name: Check semver compliance
        run: |
          export CMAKE=cmake
          cargo semver-checks --package craton_hsm || true  # Non-blocking until 1.0

  # ── Miri: undefined-behavior checks on safety-critical crypto modules ──
  miri:
    name: Miri (Undefined Behavior Check)
    needs: fmt-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust nightly + Miri
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # nightly
        with:
          toolchain: nightly
          components: miri

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2

      - name: Run Miri on unit tests
        run: cargo +nightly miri test --lib -- --test-threads=1 crypto::zeroize crypto::digest crypto::integrity
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-symbolic-alignment-check"


  # ── Documentation: build on PRs, deploy on main ──
  docs:
    name: Documentation
    needs: fmt-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2

      - name: Build documentation
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "--cfg docsrs"

      - name: Add redirect index
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo '<meta http-equiv="refresh" content="0; url=craton_hsm/index.html">' > target/doc/index.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: target/doc

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        continue-on-error: true  # Fails until GitHub Pages is enabled in repo settings


